<svg viewBox="0 0 320 175" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Nintendo 64 controller button layout</title>
  <g fill="none" stroke="#c7c7d6" stroke-width="2.5" stroke-linejoin="round">
    <rect x="50" y="90" width="80" height="46" rx="18"/>
    <rect x="190" y="90" width="80" height="46" rx="18"/>
    <rect x="135" y="25" width="50" height="68" rx="18"/>
    <circle cx="160" cy="90" r="16"/>
    <rect x="75" y="105" width="30" height="14"/>
    <rect x="83" y="97" width="14" height="30"/>
    <rect x="150" y="35" width="20" height="10" rx="5"/>
    <circle cx="160" cy="65" r="12"/>
    <circle cx="215" cy="118" r="9"/>
    <circle cx="245" cy="112" r="11"/>
    <rect x="254" y="88" width="8" height="8"/>
    <rect x="254" y="104" width="8" height="8"/>
    <rect x="246" y="96" width="8" height="8"/>
    <rect x="262" y="96" width="8" height="8"/>
    <rect x="45" y="78" width="35" height="11" rx="4"/>
    <rect x="240" y="78" width="35" height="11" rx="4"/>
    <rect x="145" y="100" width="30" height="11" rx="4" stroke-dasharray="3 3"/>
  </g>
  <g fill="#c7c7d6" font-family="Inter, system-ui, sans-serif" font-size="8.5" text-anchor="middle">
    <text x="62" y="73">L</text>
    <text x="257" y="73">R</text>
    <text x="160" y="18">START</text>
    <text x="90" y="155">D-PAD</text>
    <text x="258" y="155">C-BUTTONS</text>
    <text x="215" y="121">B</text>
    <text x="245" y="116">A</text>
    <text x="160" y="130">Z (REAR)</text>
  </g>
  <text x="176" y="68" fill="#c7c7d6" font-family="Inter, system-ui, sans-serif" font-size="8.5" text-anchor="start">STICK</text>
</svg>
