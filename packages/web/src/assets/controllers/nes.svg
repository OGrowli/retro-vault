<svg viewBox="0 0 260 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>NES controller button layout</title>
  <g fill="none" stroke="#c7c7d6" stroke-width="2.5" stroke-linejoin="round">
    <rect x="10" y="30" width="240" height="60" rx="10"/>
    <rect x="35" y="52" width="40" height="16"/>
    <rect x="47" y="40" width="16" height="40"/>
    <rect x="108" y="66" width="28" height="11" rx="5.5"/>
    <rect x="142" y="66" width="28" height="11" rx="5.5"/>
    <circle cx="190" cy="60" r="13"/>
    <circle cx="222" cy="60" r="13"/>
  </g>
  <g fill="#c7c7d6" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">
    <text x="55" y="106">D-PAD</text>
    <text x="122" y="90">SELECT</text>
    <text x="156" y="90">START</text>
    <text x="190" y="63">B</text>
    <text x="222" y="63">A</text>
