<svg viewBox="0 0 320 170" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Generic arcade cabinet layout: 8-way joystick and 6-button panel</title>
  <g fill="none" stroke="#c7c7d6" stroke-width="2.5" stroke-linejoin="round">
    <circle cx="65" cy="95" r="26"/>
    <circle cx="65" cy="95" r="11"/>
    <line x1="65" y1="95" x2="65" y2="60"/>
    <circle cx="155" cy="70" r="15"/>
    <circle cx="195" cy="70" r="15"/>
    <circle cx="235" cy="70" r="15"/>
    <circle cx="165" cy="112" r="15"/>
    <circle cx="205" cy="112" r="15"/>
    <circle cx="245" cy="112" r="15"/>
    <rect x="255" y="18" width="50" height="12" rx="4"/>
    <rect x="255" y="34" width="50" height="12" rx="4"/>
  </g>
  <g fill="#c7c7d6" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">
    <text x="65" y="140">8-WAY STICK</text>
    <text x="155" y="73">1</text>
    <text x="195" y="73">2</text>
    <text x="235" y="73">3</text>
    <text x="165" y="115">4</text>
    <text x="205" y="115">5</text>
    <text x="245" y="115">6</text>
    <text x="280" y="27">START</text>
    <text x="280" y="43">COIN</text>
  </g>
  <text x="200" y="150" fill="#8a899a" font-family="Inter, system-ui, sans-serif" font-size="8.5" text-anchor="middle">layout varies by cabinet/game &mdash; treat as a starting point</text>
</svg>
